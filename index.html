<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR CACTUS AI - ULTIMATE FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        body {
            background: radial-gradient(circle at center, #001a1a 0%, #000000 100%);
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            color: #22d3ee;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        .glass {
            background: rgba(0, 30, 40, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        /* Spinning Animation for Circles */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .spin-frame {
            animation: spin 10s linear infinite;
        }

        .spin-reverse {
            animation: spin 15s linear infinite reverse;
        }

        /* Floating Cactus */
        @keyframes float {

            0%,
            100% {
                transform: translate(-50%, -50%) translateY(0);
            }

            50% {
                transform: translate(-50%, -50%) translateY(-20px);
            }
        }

        .cactus-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>

<body class="h-screen w-full relative">
    <h1 class=" py-40 md:py-10 flex justify-center py-16gi text-4xl md:text-6xl font-bold italic tracking-wider drop-shadow-[0_0_15px_rgba(34,211,238,0.8)]"
        style="font-family: 'Dancing Script', cursive; color: #22d3ee;">
        mr-cactus
    </h1>
    <div id="particles-js"></div>

    <div class="absolute top-6 left-10 flex flex-row gap-8 z-30">
        <div class="relative w-28 h-28 flex items-center justify-center">
            <div class="absolute inset-0 border-2 border-dashed border-cyan-400 rounded-full spin-frame"></div>
            <div class="text-center">
                <div id="digital-clock" class="text-xl font-bold text-cyan-400">00:00</div>
                <div id="date-info" class="text-[8px] uppercase tracking-widest opacity-50">DATE</div>
            </div>
        </div>

        <div class="relative w-28 h-28 flex items-center justify-center">
            <div class="absolute inset-0 border-2 border-dotted border-pink-500 rounded-full spin-reverse"></div>
            <div class="text-center">
                <div id="temp-display" class="text-xl font-bold text-pink-400">--°C</div>
                <div id="weather-desc" class="text-[8px] uppercase tracking-widest opacity-50">WEATHER</div>
            </div>
        </div>
    </div>

    <div class="cactus-center z-10">
        <div class="text-[120px] md:text-[160px] drop-shadow-[0_0_60px_rgba(34,211,238,0.6)]">🌵</div>
    </div>

    <div class="absolute right-10 top-1/4 w-72 h-[400px] glass rounded-3xl p-5 z-20 overflow-hidden shadow-2xl">
        <div class="text-[10px] font-bold border-b border-cyan-500/20 pb-2 mb-3 flex justify-between uppercase">
            <span>System_Log.txt</span>
            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
        </div>
        <div id="terminal-box" class="text-[10px] space-y-2 h-[320px] overflow-y-auto text-cyan-300/80">
            <p>> System Ready...</p>
        </div>
    </div>


    <div class="absolute bottom-10 left-10 flex pb-20 lg:py-0 lg:grid lg:grid-cols-3 gap-4 z-30">
        <button onclick="window.open('https://facebook.com')"
            class="w-12 h-12 glass  rounded-2xl flex items-center justify-center hover:bg-blue-600 transition-all font-bold text-white shadow-lg"><i
                class="fa-brands fa-facebook-f"></i></button>
        <button onclick="window.open('https://tiktok.com')"
            class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-black transition-all font-bold text-white shadow-lg"><i
                class="fa-brands fa-tiktok"></i></button>
        <button onclick="window.open('https://youtube.com')"
            class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-red-600 transition-all font-bold text-white shadow-lg"><i
                class="fa-brands fa-youtube"></i></button>
        <button onclick="window.open('https://chatgpt.com')"
            class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-green-600 transition-all font-bold text-white shadow-lg"><i
                class="fa-brands fa-openai"></i></button>
        <button onclick="window.open('https://web.whatsapp.com')"
            class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-emerald-500 transition-all font-bold text-white shadow-lg"><i
                class="fa-brands fa-whatsapp"></i></button>
        <button onclick="window.open('https://google.com')"
            class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-cyan-500 transition-all font-bold text-white shadow-lg"><i
                class="fa-brands fa-google"></i></button>
    </div>

    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-[600px] flex items-center gap-4 z-30">
        <div class="flex-1 relative">
            <input id="user-input" type="text" placeholder="Command Mr. Cactus..."
                class="w-full bg-black/60 border border-cyan-500/20 rounded-full py-5 px-8 text-white text-sm focus:outline-none focus:border-cyan-400 backdrop-blur-2xl shadow-2xl">
        </div>
        <button id="mic-btn"
            class="w-16 h-16 rounded-full bg-cyan-500 flex items-center justify-center shadow-[0_0_30px_rgba(34,211,238,0.5)] hover:scale-110 active:scale-95 transition-all text-black text-2xl">
            🎤
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Clock & Date Logic
            function updateTime() {
                const now = new Date();
                document.getElementById('digital-clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
                document.getElementById('date-info').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
            }
            setInterval(updateTime, 1000);
            updateTime();

            // Weather Logic (Fixed with Open-Meteo)
            async function getWeatherData() {
                try {
                    const locRes = await fetch('https://ipapi.co/json/');
                    const locData = await locRes.json();

                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${locData.latitude}&longitude=${locData.longitude}&current_weather=true`);
                    const weatherData = await weatherRes.json();

                    const temp = Math.round(weatherData.current_weather.temperature);
                    document.getElementById('temp-display').innerText = `${temp}°C`;
                    document.getElementById('weather-desc').innerText = locData.city.toUpperCase();
                    addToLog(`Syncing weather for ${locData.city}... Done.`);
                } catch (e) {
                    document.getElementById('temp-display').innerText = "26°C"; // Default fallback
                    document.getElementById('weather-desc').innerText = "CLOUDY";
                }
            }
            getWeatherData();
            setInterval(getWeatherData, 600000); // 10 min refresh

            // Terminal Log
            function addToLog(msg) {
                const box = document.getElementById('terminal-box');
                const p = document.createElement('p');
                p.innerHTML = `> ${msg}`;
                box.appendChild(p);
                box.scrollTop = box.scrollHeight;
            }

            // Particles Background
            particlesJS("particles-js", {
                particles: {
                    number: { value: 60 },
                    color: { value: "#ffffff" },
                    opacity: { value: 0.2 },
                    size: { value: 1.2 },
                    move: { enable: true, speed: 0.6, direction: "top" }
                }
            });
        });
    </script>
</body>

</html>
